# 21st.dev Priority Categories
21st_priority_categories:
  core_landing:
    - landing-page
    - hero
    - animated-hero-section
    - features
    - call-to-action
    - testimonials
    - pricing-sections
    - text-components

  app_shell:
    - sidebar
    - menu
    - menu-bar
    - modal-dialog
    - popup

  dashboard_admin:
    - dashboard
    - dashboard-widget
    - admin-panel
    - card
    - info-card
    - empty-state

  ecommerce_b2b:
    - interactive-product-card
    - card
    - pricing-sections
    - modal-dialog
    - call-to-action
    - empty-state

  ai_apps:
    - ai-chat-components
    - framer-motion
    - prompt-input
    - floating-chat-widget

  polish_effects:
    - framer-motion
    - click-animation
    - buttons
    - text-components
    - card

  production_states:
    - empty-state
    - loading-state
    - error-state
    - alert-dialog
    - file-upload
    - dropdown-menu
    - popover
    - command-menu
    - carousel
    - tabs
    - search-bar
    - stats-card

# Page Type to Category Mapping
page_type_category_map:
  homepage:
    required: [hero, features, call-to-action, testimonials]
    optional: [landing-page, framer-motion, text-components, card]

  landing_page:
    required: [landing-page, hero, call-to-action, features]
    optional: [testimonials, pricing-sections, framer-motion, text-components]

  admin_dashboard:
    required: [dashboard, dashboard-widget, sidebar, card]
    optional: [admin-panel, modal-dialog, empty-state, menu-bar]

  client_portal:
    required: [sidebar, dashboard-widget, card, modal-dialog]
    optional: [empty-state, info-card, menu]

  ecommerce_product_page:
    required: [interactive-product-card, card, call-to-action, modal-dialog]
    optional: [pricing-sections, testimonials, empty-state]

  b2b_website:
    required: [hero, features, call-to-action, testimonials, pricing-sections]
    optional: [interactive-product-card, modal-dialog, card, empty-state]

  ai_chat_app:
    required: [ai-chat-components, modal-dialog]
    optional: [framer-motion, floating-chat-widget, dashboard-widget]

  documentation_site:
    required: [menu, sidebar, card, text-components]
    optional: [call-to-action, empty-state]

  monitoring_frontend:
    required: [dashboard, dashboard-widget, sidebar, card, empty-state]
    optional: [admin-panel, info-card, modal-dialog, stats-card]

  b2b_ecommerce:
    required: [interactive-product-card, card, pricing-sections, call-to-action, testimonials]
    optional: [modal-dialog, empty-state, features, hero]

